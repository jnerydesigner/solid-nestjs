version: '3.5'

services:
  postgres_solid:
    image: postgres
    container_name: postgres_solid
    volumes:
      - postgres_solid:/data/postgres
    environment:
      POSTGRES_PASSWORD: 123456
      POSTGRES_USER: root
      POSTGRES_DB: solid
      PGDATA: /data/postgres
    ports:
      - '5442:5432'
    networks:
      - postgres
    restart: unless-stopped

  pgadmin_solid:
    container_name: pgadmin_solid
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-jander.webmaster@gmail.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-123456}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin_solid:/var/lib/pgadmin
    ports:
      - '${PGADMIN_PORT:-5050}:80'
    networks:
      - postgres
    restart: unless-stopped

networks:
  postgres:
    driver: bridge

volumes:
  pgadmin_solid:
  postgres_solid:
